<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JuJutsu Vault | Cadastro</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/cadastro.css">
</head>

<body>
  <section class="cadastro">
    <img src="./assets/imgs/cadastro/todo_bg.svg" alt="Aoi Todo" class="decor">

    <div class="form">
      <div class="welcome">
        <h1>Torne-se um Feticeiro JuJutsu</h1>
        <h2>Por Favor, coloque suas credenciais</h2>
      </div>

      <div class="inputs">
        <div class="ipt">
          <span>Nome:</span>
          <input id="nome_input" type="text" placeholder="Seu nome">
        </div>

        <div class="ipt">
          <span>Email:</span>
          <input id="email_input" type="text" placeholder="meuemail@provedor.com">
        </div>

        <div class="ipt">
          <span>Senha:</span>
          <input id="senha_input" type="password" placeholder="******">
        </div>

        <div class="ipt">
          <span>Confirmar Senha:</span>
          <input id="confirmacao_senha_input" type="password" placeholder="******">
        </div>
      </div>

      <button onclick="cadastrar()" class="btn" id="cadastro-btn">Cadastrar-Se</button>
    </div>
  </section>
</body>

</html>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      nomeVar.length < 1 ||
      (!emailVar.includes("@") || !emailVar.includes(".")) ||
      senhaVar != confirmacaoSenhaVar
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Campos inválidos!";

      return false;
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          alert("Cadastro realizado com sucesso! Redirecionando para tela de Login...");

          setTimeout(() => {
            window.location = './login.html';
          });

        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }
</script>
