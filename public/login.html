<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuJutsu Vault | Login</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>
    <section class="login">
        <div class="form">
            <div class="welcome">
                <h1>Bem Vindo de Volta Feiticeiro</h1>
                <h2>Por Favor, coloque suas credenciais</h2>
            </div>
    
            <div class="inputs">
                <div class="ipt">
                    <span>Email:</span>
                    <input id="email_input" type="text" placeholder="Login">
                </div>
    
                <div class="ipt">
                    <span>Senha:</span>
                    <input id="senha_input" type="password" placeholder="******">
                </div>
            </div>
    
            <button onclick="entrar()" class="btn" id="login-btn">Login</button>
        </div>
        <img src="./assets/imgs/login/gojo_bg.svg" alt="Satoru Gojo" class="decor decor-1">
        <img src="./assets/imgs/login/toji_bg.svg" alt="Toji Fushiguro Renascido" class="decor decor-2">
    </section>
</body>

</html>

<script>
    function entrar() {
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "" || (!emailVar.includes("@") || !emailVar.includes("."))) {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "Campos inválidos!";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "./index.html";
                    });
                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
